<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>3D Shooter — Babylon</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
    #app { width: 100%; height: 100%; display: block; outline: none; touch-action: none; }
    .hud { position: fixed; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.7); user-select: none; pointer-events: none; }
    #kills { top: 14px; left: 16px; font-size: 18px; }
    #ammo  { right: 16px; bottom: 14px; font-size: 22px; font-weight: 700; }
    #controls { left: 0; right: 0; bottom: 12px; text-align: center; font-size: 12px; opacity: .75; }
    #crosshair { left: 50%; top: 50%; width: 18px; height: 18px; transform: translate(-50%,-50%);
      background: radial-gradient(circle, #fff 0 1px, transparent 2px),
                  linear-gradient(#fff,#fff) center/2px 18px no-repeat,
                  linear-gradient(#fff,#fff) center/18px 2px no-repeat; opacity: .85; }
    #overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.62); color: #fff; cursor: pointer; z-index: 10; backdrop-filter: blur(2px); }
    #overlay .box { text-align: center; }
    #overlay h1 { font-size: 26px; margin: 0 0 8px; }
    #overlay p { opacity: .8; font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <div id="crosshair" class="hud"></div>
  <div id="kills" class="hud">Убито: 0</div>
  <div id="ammo" class="hud">Пистолет: 12 / 12</div>
  <div id="controls" class="hud">WASD/ЦФЫВ — движение · мышь / ←→ — обзор · Ctrl — присед (присед+прыжок = в окно) · ЛКМ — стрелять · 1/2 — оружие · R — перезарядка · Пробел — прыжок · M — карта</div>
  <div id="overlay"><div class="box"><h1>🔫 3D Shooter</h1><p>Кликни, чтобы играть</p></div></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

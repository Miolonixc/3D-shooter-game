<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простая 3D Игра</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 20px;
            text-shadow: 2px 2px 4px #000;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0;
            font-family: Arial, sans-serif;
            font-size: 36px;
            text-shadow: 2px 2px 8px #000;
            display: none;
            text-align: center;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 14px;
            text-align: center;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>
    <div id="ui">Собрано: <span id="score">0</span> / <span id="total">0</span></div>
    <div id="message"></div>
    <div id="controls">WASD или стрелки — движение | Мышь — поворот | Собирайте золотые кубики!</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const playerGeometry = new THREE.BoxGeometry(0.8, 1.2, 0.8);
        const playerMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff88 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.position.y = 0.6;
        player.castShadow = true;
        scene.add(player);

        const groundGeo = new THREE.PlaneGeometry(60, 60);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x2a2a4a });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const wallMaterial = new THREE.MeshPhongMaterial({ color: 0x4a4a6a });
        const walls = [];
        const wallPositions = [
            { x: 0, z: -15, sx: 30, sz: 1 },
            { x: 0, z: 15, sx: 30, sz: 1 },
            { x: -15, z: 0, sx: 1, sz: 30 },
            { x: 15, z: 0, sx: 1, sz: 30 },
            { x: -5, z: -5, sx: 1, sz: 8 },
            { x: 5, z: 3, sx: 8, sz: 1 },
            { x: 8, z: -8, sx: 1, sz: 6 },
            { x: -8, z: 6, sx: 6, sz: 1 },
            { x: 3, z: -10, sx: 4, sz: 1 },
            { x: -10, z: -2, sx: 1, sz: 5 },
        ];

        wallPositions.forEach(w => {
            const wallGeo = new THREE.BoxGeometry(w.sx, 3, w.sz);
            const wall = new THREE.Mesh(wallGeo, wallMaterial);
            wall.position.set(w.x, 1.5, w.z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            walls.push(wall);
        });

        const collectibles = [];
        const collectibleGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const collectibleMat = new THREE.MeshPhongMaterial({
            color: 0xffd700,
            emissive: 0xaa8800,
            emissiveIntensity: 0.3
        });

        for (let i = 0; i < 15; i++) {
            const cube = new THREE.Mesh(collectibleGeo, collectibleMat.clone());
            let x, z;
            do {
                x = (Math.random() - 0.5) * 28;
                z = (Math.random() - 0.5) * 28;
            } while (Math.abs(x) < 2 && Math.abs(z) < 2);
            cube.position.set(x, 0.5, z);
            cube.castShadow = true;
            scene.add(cube);
            collectibles.push(cube);
        }

        document.getElementById('total').textContent = collectibles.length;

        const particles = [];
        for (let i = 0; i < 50; i++) {
            const pGeo = new THREE.SphereGeometry(0.05);
            const pMat = new THREE.MeshBasicMaterial({ color: 0x6666ff });
            const p = new THREE.Mesh(pGeo, pMat);
            p.position.set((Math.random() - 0.5) * 40, Math.random() * 10, (Math.random() - 0.5) * 40);
            scene.add(p);
            particles.push(p);
        }

        const keys = {};
        let yaw = 0;
        let pitch = 0;
        let score = 0;
        let gameWon = false;

        document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
            }
        });

        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });

        function checkCollision(newX, newZ) {
            const r = 0.4;
            for (const wall of walls) {
                const b = new THREE.Box3().setFromObject(wall);
                b.expandByScalar(r);
                if (newX > b.min.x && newX < b.max.x && newZ > b.min.z && newZ < b.max.z) {
                    return true;
                }
            }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!gameWon) {
                const speed = 0.12;
                let dx = 0, dz = 0;

                if (keys['w'] || keys['arrowup']) { dx += Math.sin(yaw); dz += Math.cos(yaw); }
                if (keys['s'] || keys['arrowdown']) { dx -= Math.sin(yaw); dz -= Math.cos(yaw); }
                if (keys['a'] || keys['arrowleft']) { dx += Math.cos(yaw); dz -= Math.sin(yaw); }
                if (keys['d'] || keys['arrowright']) { dx -= Math.cos(yaw); dz += Math.sin(yaw); }

                const len = Math.sqrt(dx * dx + dz * dz);
                if (len > 0) {
                    dx = dx / len * speed;
                    dz = dz / len * speed;
                    const nx = player.position.x + dx;
                    const nz = player.position.z + dz;
                    if (!checkCollision(nx, player.position.z)) player.position.x = nx;
                    if (!checkCollision(player.position.x, nz)) player.position.z = nz;
                }

                camera.position.copy(player.position);
                camera.position.y += 0.6;
                camera.rotation.order = 'YXZ';
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;

                for (let i = collectibles.length - 1; i >= 0; i--) {
                    const c = collectibles[i];
                    c.rotation.y += 0.03;
                    c.rotation.x += 0.01;
                    c.position.y = 0.5 + Math.sin(Date.now() * 0.003 + i) * 0.15;

                    if (player.position.distanceTo(c.position) < 1) {
                        scene.remove(c);
                        collectibles.splice(i, 1);
                        score++;
                        document.getElementById('score').textContent = score;

                        if (score === parseInt(document.getElementById('total').textContent)) {
                            gameWon = true;
                            const msg = document.getElementById('message');
                            msg.textContent = 'Победа! Все кубики собраны!';
                            msg.style.display = 'block';
                        }
                    }
                }
            }

            particles.forEach((p, i) => {
                p.position.y += Math.sin(Date.now() * 0.001 + i) * 0.005;
                p.position.x += Math.cos(Date.now() * 0.0005 + i) * 0.003;
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>

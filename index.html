<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простая 3D Игра</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 20px;
            text-shadow: 2px 2px 4px #000;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0;
            font-family: Arial, sans-serif;
            font-size: 36px;
            text-shadow: 2px 2px 8px #000;
            display: none;
            text-align: center;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 14px;
            text-align: center;
            text-shadow: 1px 1px 2px #000;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
        }
        #crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }
        #crosshair::after {
            width: 20px;
            height: 2px;
            top: 9px;
            left: 0;
        }
        #ammo {
            position: absolute;
            bottom: 50px;
            right: 30px;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 24px;
            text-shadow: 2px 2px 4px #000;
        }
        #kills {
            position: absolute;
            bottom: 80px;
            right: 30px;
            color: #f44;
            font-family: Arial, sans-serif;
            font-size: 20px;
            text-shadow: 2px 2px 4px #000;
        }
        #reload-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            display: none;
        }
        #reload-fill {
            height: 100%;
            width: 0%;
            background: #f80;
            border-radius: 3px;
            transition: width 0.05s linear;
        }
        .damage-num {
            position: absolute;
            color: #ff4444;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            white-space: nowrap;
            animation: dmgFloat 0.8s ease-out forwards;
        }
        .damage-num.headshot {
            color: #ff0;
            font-size: 24px;
        }
        @keyframes dmgFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
        #muzzleFlash {
            position: absolute;
            bottom: 28%;
            right: 22%;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #ff8 40%, #f60 70%, transparent 100%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.05s;
        }
        #minimap {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            background: rgba(0,0,0,0.6);
            pointer-events: none;
        }
        #interact {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 8px;
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">Собрано: <span id="score">0</span> / <span id="total">0</span></div>
    <div id="crosshair"></div>
    <div id="muzzleFlash"></div>
    <div id="ammo">Патроны: 30 / 30</div>
    <div id="kills">Убито: 0 / 5</div>
    <div id="reload-bar"><div id="reload-fill"></div></div>
    <div id="interact"></div>
    <div id="message"></div>
    <canvas id="minimap" width="200" height="200"></canvas>
    <div id="controls">WASD / Стрелки — движение | Мышь — поворот | Пробел — прыжок | Ctrl — присесть | ЛКМ — стрелять | R — перезарядка | 1/2 — оружие | E — действие</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x9ec9f0);
        scene.fog = new THREE.Fog(0x9ec9f0, 60, 260);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, -12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xb0b4c0, 0.9);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfff4e0, 1.0);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // небесный заполняющий свет — чтобы стены/здания не тонули в тени крыш
        const hemiLight = new THREE.HemisphereLight(0xbfd9f2, 0x6a6658, 0.85);
        scene.add(hemiLight);

        const playerGeometry = new THREE.BoxGeometry(0.8, 1.2, 0.8);
        const playerMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff88 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.position.set(0, 0.6, -12);
        player.castShadow = true;
        scene.add(player);

        let crouchH = 0.6;

        const groundGeo = new THREE.PlaneGeometry(120, 120);
        const groundCanvas = document.createElement('canvas');
        groundCanvas.width = 512; groundCanvas.height = 512;
        const gctx = groundCanvas.getContext('2d');
        gctx.fillStyle = '#3a3a3a';
        gctx.fillRect(0, 0, 512, 512);
        for (let i = 0; i < 10000; i++) {
            const v = Math.random() * 20;
            gctx.fillStyle = `rgb(${58+v},${58+v},${58+v})`;
            gctx.fillRect(Math.random()*512, Math.random()*512, Math.random()*3+1, Math.random()*3+1);
        }
        for (let y = 0; y < 512; y += 64) {
            gctx.strokeStyle = 'rgba(0,0,0,0.08)';
            gctx.beginPath(); gctx.moveTo(0, y); gctx.lineTo(512, y); gctx.stroke();
        }
        for (let x = 0; x < 512; x += 64) {
            gctx.beginPath(); gctx.moveTo(x, 0); gctx.lineTo(x, 512); gctx.stroke();
        }
        const groundTex = new THREE.CanvasTexture(groundCanvas);
        groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
        groundTex.repeat.set(8, 8);
        const groundMat = new THREE.MeshLambertMaterial({ map: groundTex });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        function makeBrickTex(r, g, b) {
            const c = document.createElement('canvas');
            c.width = 256; c.height = 256;
            const cx = c.getContext('2d');
            cx.fillStyle = `rgb(${r},${g},${b})`;
            cx.fillRect(0, 0, 256, 256);
            for (let row = 0; row < 16; row++) {
                const off = (row % 2) * 16;
                for (let col = -1; col < 9; col++) {
                    const bx = col * 32 + off, by = row * 16;
                    const v = Math.random() * 20 - 10;
                    cx.fillStyle = `rgb(${r+v},${g+v},${b+v})`;
                    cx.fillRect(bx + 1, by + 1, 30, 14);
                }
            }
            const tex = new THREE.CanvasTexture(c);
            return new THREE.MeshLambertMaterial({ map: tex });
        }

        function makeConcreteTex() {
            const c = document.createElement('canvas');
            c.width = 256; c.height = 256;
            const cx = c.getContext('2d');
            cx.fillStyle = '#888';
            cx.fillRect(0, 0, 256, 256);
            for (let i = 0; i < 5000; i++) {
                const v = Math.random() * 30 - 15;
                cx.fillStyle = `rgba(${136+v},${136+v},${136+v},0.3)`;
                cx.fillRect(Math.random()*256, Math.random()*256, Math.random()*4+1, Math.random()*2+1);
            }
            const tex = new THREE.CanvasTexture(c);
            return new THREE.MeshLambertMaterial({ map: tex });
        }

        function makeWoodTex() {
            const c = document.createElement('canvas');
            c.width = 128; c.height = 128;
            const cx = c.getContext('2d');
            cx.fillStyle = '#6b4226';
            cx.fillRect(0, 0, 128, 128);
            for (let y = 0; y < 128; y++) {
                const v = Math.sin(y * 0.3) * 8 + Math.random() * 6;
                cx.fillStyle = `rgb(${107+v},${66+v},${38+v})`;
                cx.fillRect(0, y, 128, 1);
            }
            const tex = new THREE.CanvasTexture(c);
            return new THREE.MeshLambertMaterial({ map: tex });
        }

        const brickTex = makeBrickTex(140, 80, 60);
        const brickTex2 = makeBrickTex(120, 90, 80);
        const concreteTex = makeConcreteTex();
        const woodTex = makeWoodTex();

        const walls = [];
        const boxes = [];

        function W(x, z, sx, sz, mat, h) {
            h = h || 3;
            const geo = new THREE.BoxGeometry(sx, h, sz);
            const m = new THREE.Mesh(geo, mat);
            m.position.set(x, h / 2, z);
            m.castShadow = true; m.receiveShadow = true;
            scene.add(m); walls.push(m); return m;
        }

        function FLOOR(x, z, sx, sz, y, mat) {
            const g = new THREE.PlaneGeometry(sx, sz);
            const m = new THREE.Mesh(g, mat || concreteTex);
            m.rotation.x = -Math.PI / 2;
            m.position.set(x, y, z); m.receiveShadow = true;
            scene.add(m);
        }

        function STEPS(x, z, dir, n, sh, sd, w, mat) {
            for (let i = 0; i < n; i++) {
                const h = (i + 1) * sh;
                const geo = new THREE.BoxGeometry(dir === 'x' ? sd : w, h, dir === 'z' ? sd : w);
                const m = new THREE.Mesh(geo, mat);
                m.position.set(dir === 'x' ? x + i * sd : x, h / 2, dir === 'z' ? z + i * sd : z);
                m.castShadow = true; m.receiveShadow = true;
                scene.add(m);
                boxes.push({ mesh: m, type: 'low', h, x: dir === 'x' ? x + i * sd : x, z: dir === 'z' ? z + i * sd : z });
            }
        }

        function PLATFORM(x, z, sx, sz, h, mat) {
            const geo = new THREE.BoxGeometry(sx, 0.2, sz);
            const m = new THREE.Mesh(geo, mat || concreteTex);
            m.position.set(x, h, z); m.receiveShadow = true; m.castShadow = true;
            scene.add(m);
            boxes.push({ mesh: m, type: 'low', h, x, z });
        }

        const W3 = (x, z, sx, sz, mat) => W(x, z, sx, sz, mat, 4);
        const b = 1.0;

        // === ГРАНИЦЫ ===
        W3(0, -35, 70, b, brickTex2);
        W3(0, 35, 70, b, brickTex2);
        W3(-35, 0, b, 70, brickTex2);
        W3(35, 0, b, 70, brickTex2);

        // === ЗДАНИЕ A: x:-25..-7, z:-9..9 ===
        W3(-21, -9, 8, b, brickTex);
        W3(-11, -9, 8, b, brickTex);
        W3(-16, 9, 18, b, brickTex);
        W(-25, 0, b, 18, brickTex, 4);
        W(-7, -5, b, 8, brickTex, 4);
        W(-7, 5, b, 8, brickTex, 4);

        // === ЗДАНИЕ B: x:7..25, z:-9..9 ===
        W3(11, -9, 8, b, brickTex2);
        W3(21, -9, 8, b, brickTex2);
        W3(16, 9, 18, b, brickTex2);
        W(7, -5, b, 8, brickTex2, 4);
        W(7, 5, b, 8, brickTex2, 4);
        W(25, 0, b, 18, brickTex2, 4);

        // === ЗДАНИЕ C: x:-25..-7, z:-25..-17 ===
        W3(-21, -17, 8, b, brickTex);
        W3(-11, -17, 8, b, brickTex);
        W3(-16, -25, 18, b, brickTex);
        W(-25, -21, b, 8, brickTex, 4);
        W(-7, -21, b, 8, brickTex, 4);

        // === ЗДАНИЕ D: x:7..25, z:-25..-17 ===
        W3(11, -17, 8, b, brickTex2);
        W3(21, -17, 8, b, brickTex2);
        W3(16, -25, 18, b, brickTex2);
        W(7, -21, b, 8, brickTex2, 4);
        W(25, -21, b, 8, brickTex2, 4);

        // === СКЛАД: x:-8..8, z:17..27 ===
        W(-5, 17, 6, b, brickTex, 5);
        W(5, 17, 6, b, brickTex, 5);
        W(0, 27, 16, b, brickTex, 5);
        W(-8, 22, b, 10, brickTex, 5);
        W(8, 22, b, 10, brickTex, 5);

        // === МОСТ y=3.5 ===
        PLATFORM(0, 0, 14, 3, 3.5);
        W(0, -1.5, 14, b, concreteTex, 1.2);
        W(0, 1.5, 14, b, concreteTex, 1.2);

        // === ЛЕСТЕНИЦЫ ===
        STEPS(-22, -7, 'z', 7, 0.5, 0.5, 1.5, woodTex);
        STEPS(22, -7, 'z', 7, 0.5, 0.5, 1.5, woodTex);
        STEPS(-22, -19, 'z', 7, 0.5, 0.5, 1.5, woodTex);
        STEPS(22, -19, 'z', 7, 0.5, 0.5, 1.5, woodTex);

        // === КРЫШИ с текстурой ===
        const roofTex = (() => {
            const c = document.createElement('canvas');
            c.width = 256; c.height = 256;
            const cx = c.getContext('2d');
            cx.fillStyle = '#5a5a5a';
            cx.fillRect(0, 0, 256, 256);
            for (let i = 0; i < 3000; i++) {
                const v = Math.random() * 20;
                cx.fillStyle = `rgba(${90+v},${90+v},${90+v},0.4)`;
                cx.fillRect(Math.random()*256, Math.random()*256, Math.random()*4+1, 1);
            }
            cx.strokeStyle = 'rgba(0,0,0,0.15)';
            cx.lineWidth = 1;
            for (let i = 0; i < 256; i += 32) {
                cx.beginPath(); cx.moveTo(i, 0); cx.lineTo(i, 256); cx.stroke();
                cx.beginPath(); cx.moveTo(0, i); cx.lineTo(256, i); cx.stroke();
            }
            const t = new THREE.CanvasTexture(c);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            t.repeat.set(4, 4);
            return t;
        })();
        const roofMat = new THREE.MeshLambertMaterial({ map: roofTex });

        PLATFORM(-17, 0, 20, 18, 3.55, roofMat);
        PLATFORM(17, 0, 20, 18, 3.55, roofMat);
        PLATFORM(-17, -21, 20, 8, 3.55, roofMat);
        PLATFORM(17, -21, 20, 8, 3.55, roofMat);

        // === ДВЕРИ ===
        const doorMat = woodTex;
        const doors = [];
        function addDoor(x, z, ry, w) {
            w = w || 1.4;
            const dh = 2.8;
            const pivot = new THREE.Group();
            pivot.position.set(x, 0, z);
            pivot.rotation.y = ry || 0;
            scene.add(pivot);
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, dh, 0.12), doorMat);
            mesh.position.set(w / 2, dh / 2, 0);
            mesh.castShadow = true;
            pivot.add(mesh);
            const hMat = new THREE.MeshPhongMaterial({ color: 0xbbaa44, specular: 0xffd700, shininess: 120 });
            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.08, 0.08), hMat);
            handle.position.set(w / 2 - 0.15, 0, 0.07);
            mesh.add(handle);
            doors.push({ mesh, pivot, x, z, open: false, ry, w });
        }

        addDoor(-16, -9, 0, 2.0);
        addDoor(16, -9, 0, 2.0);
        addDoor(-16, -17, 0, 2.0);
        addDoor(16, -17, 0, 2.0);
        addDoor(0, 17, 0, 2.5);

        // === ВЁРОВКИ ===
        const ropeMat = new THREE.MeshPhongMaterial({ color: 0x886633 });
        const ropes = [];
        function addRope(x1, y1, z1, x2, y2, z2, name) {
            const dx = x2 - x1, dy = y2 - y1, dz = z2 - z1;
            const len = Math.sqrt(dx * dx + dy * dy + dz * dz);
            const segments = 20;
            for (let i = 0; i < segments; i++) {
                const t1 = i / segments, t2 = (i + 1) / segments;
                const sag1 = Math.sin(t1 * Math.PI) * 0.15;
                const sag2 = Math.sin(t2 * Math.PI) * 0.15;
                const ax = x1 + dx * t1, ay = y1 + dy * t1 + sag1, az = z1 + dz * t1;
                const bx = x1 + dx * t2, by = y1 + dy * t2 + sag2, bz = z1 + dz * t2;
                const segLen = Math.sqrt((bx - ax) ** 2 + (by - ay) ** 2 + (bz - az) ** 2);
                if (segLen < 0.001) continue;
                const m = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, segLen, 6), ropeMat);
                m.position.set((ax + bx) / 2, (ay + by) / 2, (az + bz) / 2);
                m.lookAt(new THREE.Vector3(bx, by, bz));
                m.rotateX(Math.PI / 2);
                scene.add(m);
            }
            const pm = new THREE.MeshPhongMaterial({ color: 0x444444 });
            const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 2, 8), pm);
            p1.position.set(x1, y1 + 1, z1); scene.add(p1);
            const p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 2, 8), pm);
            p2.position.set(x2, y2 + 1, z2); scene.add(p2);
            const ballMat = new THREE.MeshPhongMaterial({ color: 0xff4400, emissive: 0xaa2200, emissiveIntensity: 0.3 });
            const ball1 = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), ballMat);
            ball1.position.set(x1, y1 + 2.1, z1); scene.add(ball1);
            const ball2 = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), ballMat);
            ball2.position.set(x2, y2 + 2.1, z2); scene.add(ball2);
            ropes.push({ x1, y1: y1 + 2.1, z1, x2, y2: y2 + 2.1, z2, name });
        }

        addRope(-17, 3.55, -21, -17, 3.55, 0, 'Верёвка: крыша C → крыша A');
        addRope(17, 3.55, -21, 17, 3.55, 0, 'Верёвка: крыша D → крыша B');

        // === УЛИЧНЫЕ ЭЛЕМЕНТЫ ===
        function addLamp(x, z) {
            const pm = new THREE.MeshPhongMaterial({ color: 0x444444, specular: 0x666666, shininess: 80 });
            const p = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.07, 4, 8), pm);
            p.position.set(x, 2, z); p.castShadow = true; scene.add(p);
            const a = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.8), pm);
            a.position.set(x, 3.9, z + 0.4); scene.add(a);
            const l = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.08, 0.3),
                new THREE.MeshPhongMaterial({ color: 0xffffcc, emissive: 0xffffaa, emissiveIntensity: 0.5 }));
            l.position.set(x, 3.85, z + 0.7); scene.add(l);
            const pl = new THREE.PointLight(0xffffcc, 0.6, 12);
            pl.position.set(x, 3.8, z + 0.7); scene.add(pl);
        }

        function addBench(x, z) {
            const sm = woodTex;
            const s = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.06, 0.4), sm);
            s.position.set(x, 0.45, z); s.castShadow = true; scene.add(s);
            const bk = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 0.04), sm);
            bk.position.set(x, 0.7, z - 0.18); scene.add(bk);
            const lm = new THREE.MeshPhongMaterial({ color: 0x333333 });
            [-0.5, 0.5].forEach(dx => [-0.15, 0.15].forEach(dz => {
                const lg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.45, 6), lm);
                lg.position.set(x + dx, 0.225, z + dz); scene.add(lg);
            }));
        }

        function addTrash(x, z) {
            const m = new THREE.MeshPhongMaterial({ color: 0x444444 });
            const bd = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.22, 0.6, 12), m);
            bd.position.set(x, 0.3, z); bd.castShadow = true; scene.add(bd);
            const l = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.04, 12), m);
            l.position.set(x, 0.62, z); scene.add(l);
        }

        addLamp(-4, -13); addLamp(4, -13);
        addLamp(-4, 13); addLamp(4, 13);
        addLamp(-30, -13); addLamp(30, -13);
        addLamp(-30, 13); addLamp(30, 13);

        addBench(-3, -13); addBench(3, -13);
        addBench(-3, 13); addBench(3, 13);

        addTrash(-2, -13); addTrash(2, -13);
        addTrash(-2, 13); addTrash(2, 13);

        const lineMat = new THREE.MeshPhongMaterial({ color: 0xdddd44 });
        for (let i = -10; i <= 10; i += 3) {
            const l = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.005, 0.15), lineMat);
            l.position.set(i, 0.03, -13); scene.add(l);
            const l2 = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.005, 0.15), lineMat);
            l2.position.set(i, 0.03, 13); scene.add(l2);
        }

        // === КОЛЛЕКТИБЛЫ ===
        const collectibles = [];
        const collectibleGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const collectibleMat = new THREE.MeshPhongMaterial({ color: 0xffd700, emissive: 0xaa8800, emissiveIntensity: 0.3 });
        [[-20, 0.7, 0],[-12, 0.7, 0],[-16, 0.7, 5],[-16, 3.8, -4],
         [20, 0.7, 0],[12, 0.7, 0],[16, 0.7, 5],[16, 3.8, -4],
         [-20, 0.7, -21],[-12, 0.7, -21],[-16, 3.8, -20],

            const dur = 0.4;
            const bufSize = audioCtx.sampleRate * dur;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) {
                const t = i / audioCtx.sampleRate;
                const click1 = Math.exp(-t * 60) * Math.sin(t * 3000) * 0.3;
                const slide1 = (t > 0.1 && t < 0.25) ? (Math.random() * 2 - 1) * 0.15 * Math.sin(t * 500) : 0;
                const click2 = (t > 0.25 && t < 0.3) ? Math.exp(-(t-0.25) * 80) * Math.sin(t * 4000) * 0.35 : 0;
                const slide2 = (t > 0.3 && t < 0.4) ? (Math.random() * 2 - 1) * 0.1 * Math.sin(t * 600) : 0;
                data[i] = click1 + slide1 + click2 + slide2;
            }
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            src.connect(audioCtx.destination);
            src.start();
        }

            tg.add(ring1);

            const ring2Geo = new THREE.CylinderGeometry(0.22, 0.22, 0.1, 16);
            const ring2Mat = new THREE.MeshPhongMaterial({ color: 0xffffff });
            const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
            tg.add(ring2);

            const coreGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.11, 16);
            const coreMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            tg.add(core);

            const poleGeo = new THREE.CylinderGeometry(0.03, 0.03, tp.h, 8);
            const poleMat = new THREE.MeshPhongMaterial({ color: 0x666666 });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.position.y = -tp.h / 2 - 0.5;
            tg.add(pole);

            tg.rotation.x = Math.PI / 2;
            tg.position.set(tp.x, tp.h + 0.5, tp.z);
            scene.add(tg);
            targets.push({ group: tg, x: tp.x, y: tp.h + 0.5, z: tp.z, alive: true, hp: 100 });
        });

        const keys = {};
        let yaw = 0;
        let pitch = 0;
        let score = 0;
        let gameWon = false;
        let velocityY = 0;
        let onGround = true;
        let crouching = false;
        const gravity = -0.015;
        const jumpForce = 0.25;
        const groundY = 0.6;
        const raycaster = new THREE.Raycaster();
        let ammo = 30;
        let lastShot = 0;

        // === ОРУЖИЕ: пистолет + SMG, переключение 1/2 ===
        const WEAPONS = {
            pistol: { name: 'Glock 17', group: gunGroup, mag: 30, fireRate: 150, dmg: 25, recoil: 0.08, auto: false },
            smg:    { name: 'SMG',      group: smgGroup, mag: 25, fireRate: 70,  dmg: 16, recoil: 0.05, auto: true }
        };
        let currentWeapon = 'pistol';
        let maxAmmo = WEAPONS.pistol.mag;
        let activeGun = gunGroup;
        const weaponAmmo = { pistol: 30, smg: 25 };
        let mouseDown = false;

        function updateAmmoHUD() {
            document.getElementById('ammo').textContent = WEAPONS[currentWeapon].name + ': ' + ammo + ' / ' + maxAmmo;
        }
        function switchWeapon(name) {
            if (name === currentWeapon || reloading || !WEAPONS[name]) return;
            weaponAmmo[currentWeapon] = ammo;
            const og = WEAPONS[currentWeapon].group;
            og.visible = false; og.position.set(0, 0, 0); og.rotation.x = 0;
            currentWeapon = name;
            activeGun = WEAPONS[name].group;
            activeGun.visible = true;
            maxAmmo = WEAPONS[name].mag;
            ammo = weaponAmmo[name];
            gunRecoil = 0;
            updateAmmoHUD();
        }
        updateAmmoHUD();
        let kills = 0;
        const totalTargets = 5;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playShootSound() {
            const dur = 0.15;
            const bufSize = audioCtx.sampleRate * dur;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) {
                const t = i / audioCtx.sampleRate;
                data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 40) * 0.5;
            }
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 2000;
            src.connect(filter).connect(audioCtx.destination);
            src.start();
        }

        function playHitSound() {
            const dur = 0.12;
            const bufSize = audioCtx.sampleRate * dur;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) {
                const t = i / audioCtx.sampleRate;
                data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 50) * 0.3 * Math.sin(t * 800);
            }
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            src.connect(audioCtx.destination);
            src.start();
        }

        function playKillSound() {
            const dur = 0.3;
            const bufSize = audioCtx.sampleRate * dur;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) {
                const t = i / audioCtx.sampleRate;
                data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 10) * 0.4 * Math.sin(t * 1200 * Math.exp(-t * 5));
            }
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            src.connect(audioCtx.destination);
            src.start();
        }

        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === 'Control') e.preventDefault();
        });
        document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
            }
        });

        function spawnDamageNumber(x, y, z, dmg, isHeadshot) {
            const el = document.createElement('div');
            el.className = 'damage-num' + (isHeadshot ? ' headshot' : '');
            el.textContent = '-' + dmg;
            document.body.appendChild(el);
            const vec = new THREE.Vector3(x, y, z);
            vec.project(camera);
            el.style.left = ((vec.x + 1) / 2 * window.innerWidth) + 'px';
            el.style.top = ((-vec.y + 1) / 2 * window.innerHeight) + 'px';
            setTimeout(() => el.remove(), 800);
        }

        renderer.domElement.addEventListener('mousedown', () => {
            if (!document.pointerLockElement) {
                renderer.domElement.requestPointerLock();
                return;
            }
            mouseDown = true;
            if (!WEAPONS[currentWeapon].auto) fire(); // полуавтомат — выстрел на клик
        });
        renderer.domElement.addEventListener('mouseup', () => { mouseDown = false; });

        function fire() {
            if (Date.now() - lastShot < WEAPONS[currentWeapon].fireRate) return;
            if (ammo <= 0 || reloading) return;
            lastShot = Date.now();
            ammo--;
            updateAmmoHUD();

            gunRecoil = WEAPONS[currentWeapon].recoil;
            muzzleFlash.style.opacity = '1';
            setTimeout(() => muzzleFlash.style.opacity = '0', 60);
            playShootSound();

            const bulletGeo = new THREE.SphereGeometry(0.04, 6, 6);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            const dir = new THREE.Vector3(0, 0, -1);
            dir.applyQuaternion(camera.quaternion);
            bullet.position.copy(camera.position);
            bullet.position.add(dir.clone().multiplyScalar(0.8));
            scene.add(bullet);
            bullets.push({ mesh: bullet, dir: dir.clone(), life: 60 });

            raycaster.setFromCamera({ x: 0, y: 0 }, camera);
            const targetMeshes = [];
            targets.forEach(t => {
                if (t.alive) t.group.children.forEach(c => targetMeshes.push(c));
            });
            const hits = raycaster.intersectObjects(targetMeshes);
            if (hits.length > 0) {
                const hitPoint = hits[0].point;
                let closest = null;
                let closestDist = 999;
                targets.forEach(t => {
                    if (!t.alive) return;
                    const d = hitPoint.distanceTo(new THREE.Vector3(t.x, t.y, t.z));
                    if (d < closestDist) { closestDist = d; closest = t; }
                });
                if (closest && closestDist < 1) {
                    const isHeadshot = hitPoint.y > closest.y + 0.3;
                    const dmg = isHeadshot ? WEAPONS[currentWeapon].dmg * 2 : WEAPONS[currentWeapon].dmg;
                    closest.hp -= dmg;
                    playHitSound();
                    spawnDamageNumber(hitPoint.x, hitPoint.y + 0.3, hitPoint.z, dmg, isHeadshot);
                    closest.group.children.forEach(c => {
                        c.material.emissive.setHex(0xff0000);
                        setTimeout(() => c.material.emissive.setHex(0x000000), 100);
                    });
                    if (closest.hp <= 0) {
                        closest.alive = false;
                        scene.remove(closest.group);
                        kills++;
                        playKillSound();
                        document.getElementById('kills').textContent = 'Убито: ' + kills + ' / ' + totalTargets;
                    }
                }
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === '1') switchWeapon('pistol');
            if (e.key === '2') switchWeapon('smg');
            if ((e.key === 'r' || e.key === 'к') && !reloading && ammo < maxAmmo) {
                reloading = true;
                reloadTimer = RELOAD_TIME;
                playReloadSound();
            }
                if ((e.key === 'e' || e.key === 'у') && !reloading) {
                let interacted = false;
                for (const door of doors) {
                    const dx = player.position.x - door.x;
                    const dz = player.position.z - door.z;
                    if (Math.sqrt(dx * dx + dz * dz) < 2.5) {
                        door.open = !door.open;
                        door.pivot.rotation.y = door.ry + (door.open ? Math.PI / 2 : 0);
                        interacted = true;
                        break;
                    }
                }
                for (const rope of ropes) {
                    const d1 = Math.sqrt((player.position.x-rope.x1)**2 + (player.position.z-rope.z1)**2);
                    const d2 = Math.sqrt((player.position.x-rope.x2)**2 + (player.position.z-rope.z2)**2);
                    if (d1 < 3) {
                        player.position.set(rope.x2, rope.y2 + 1, rope.z2);
                        velocityY = 0;
                        interacted = true;
                        break;
                    }
                    if (d2 < 3) {
                        player.position.set(rope.x1, rope.y1 + 1, rope.z1);
                        velocityY = 0;
                        interacted = true;
                        break;
                    }
                }
            }
        });

        function checkCollision(newX, newZ) {
            const r = 0.4;
            for (const wall of walls) {
                const b = new THREE.Box3().setFromObject(wall);
                b.expandByScalar(r);
                if (newX > b.min.x && newX < b.max.x && newZ > b.min.z && newZ < b.max.z) {
                    return true;
                }
            }
            for (const door of doors) {
                if (!door.open) {
                    const cos = Math.cos(door.ry);
                    const sin = Math.sin(door.ry);
                    const dx = newX - door.x;
                    const dz = newZ - door.z;
                    const lx = dx * cos + dz * sin;
                    const lz = -dx * sin + dz * cos;
                    if (Math.abs(lx) < door.w / 2 + r && Math.abs(lz) < 0.12 + r) {
                        return true;
                    }
                }
            }
            for (const box of boxes) {
                if (box.type === 'low') continue;
                const r2 = 0.4;
                const bx = box.x, bz = box.z, bw = 0.75 + r2, bd = 0.75 + r2;
                if (newX > bx - bw && newX < bx + bw && newZ > bz - bd && newZ < bz + bd) {
                    return true;
                }
            }
            return false;
        }

        function wouldClimbBox(newX, newZ) {
            const currentH = getGroundHeight(player.position.x, player.position.z);
            const newH = getGroundHeight(newX, newZ);
            return newH - currentH > 0.6;
        }

        function getGroundHeight(px, pz) {
            for (const box of boxes) {
                if (box.type !== 'low') continue;
                const geo = box.mesh.geometry;
                const hw = geo.parameters.width / 2;
                const hd = geo.parameters.depth / 2;
                if (px > box.x - hw && px < box.x + hw && pz > box.z - hd && pz < box.z + hd) {
                    return box.h;
                }
            }
            return 0;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!gameWon) {
                crouching = !!keys['control'];
                const speed = crouching ? 0.06 : 0.12;
                let dx = 0, dz = 0;

                if (keys['w'] || keys['ц'] || keys['arrowup']) { dx -= Math.sin(yaw); dz -= Math.cos(yaw); }
                if (keys['s'] || keys['ы'] || keys['arrowdown']) { dx += Math.sin(yaw); dz += Math.cos(yaw); }
                if (keys['a'] || keys['ф'] || keys['arrowleft']) { dx -= Math.cos(yaw); dz += Math.sin(yaw); }
                if (keys['d'] || keys['в'] || keys['arrowright']) { dx += Math.cos(yaw); dz -= Math.sin(yaw); }

                if (keys[' '] && onGround) {
                    velocityY = crouching ? jumpForce * 0.6 : jumpForce;
                    onGround = false;
                }

                velocityY += gravity;
                player.position.y += velocityY;

                crouchH += ((crouching ? 0.2 : 0.6) - crouchH) * 0.2;

                const feetY = player.position.y - 0.6;
                const groundHeight = getGroundHeight(player.position.x, player.position.z);
                const targetY = groundHeight + 0.6;

                if (feetY <= groundHeight) {
                    if (groundHeight - feetY < 1.0) {
                        player.position.y = targetY;
                        velocityY = 0;
                        onGround = true;
                    } else {
                        onGround = false;
                    }
                } else {
                    onGround = false;
                }

                const len = Math.sqrt(dx * dx + dz * dz);
                if (len > 0) {
                    dx = dx / len * speed;
                    dz = dz / len * speed;
                    const nx = player.position.x + dx;
                    const nz = player.position.z + dz;
                    if (!checkCollision(nx, player.position.z) && (onGround ? !wouldClimbBox(nx, player.position.z) : true)) player.position.x = nx;
                    if (!checkCollision(player.position.x, nz) && (onGround ? !wouldClimbBox(player.position.x, nz) : true)) player.position.z = nz;
                }

                camera.position.copy(player.position);
                camera.position.y += crouchH;
                camera.rotation.order = 'YXZ';
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;

                for (let i = collectibles.length - 1; i >= 0; i--) {
                    const c = collectibles[i];
                    c.rotation.y += 0.03;
                    c.rotation.x += 0.01;
                    c.position.y = c.userData.baseY + Math.sin(Date.now() * 0.003 + i) * 0.15;

                    const dx = player.position.x - c.position.x;
                    const dz = player.position.z - c.position.z;
                    if (Math.sqrt(dx * dx + dz * dz) < 1.2 && Math.abs(player.position.y - c.position.y) < 1.5) {
                        scene.remove(c);
                        collectibles.splice(i, 1);
                        score++;
                        document.getElementById('score').textContent = score;

                        if (score === parseInt(document.getElementById('total').textContent)) {
                            gameWon = true;
                            const msg = document.getElementById('message');
                            msg.textContent = 'Победа! Все кубики собраны!';
                            msg.style.display = 'block';
                        }
                    }
                }
            }

            particles.forEach((p, i) => {
                p.position.y += Math.sin(Date.now() * 0.001 + i) * 0.005;
                p.position.x += Math.cos(Date.now() * 0.0005 + i) * 0.003;
            });

            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.mesh.position.addScaledVector(b.dir, 1.5);
                b.life--;
                if (b.life <= 0) {
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                }
            }

            if (mouseDown && WEAPONS[currentWeapon].auto && document.pointerLockElement) fire(); // автоогонь SMG

            if (gunRecoil > 0 && !reloading) {
                activeGun.position.z += gunRecoil;
                activeGun.rotation.x = -gunRecoil * 2;
                gunRecoil *= 0.7;
                if (gunRecoil < 0.001) {
                    gunRecoil = 0;
                    activeGun.position.z = 0;
                    activeGun.rotation.x = 0;
                }
            }

            if (reloading) {
                reloadTimer--;
                const progress = 1 - reloadTimer / RELOAD_TIME;
                const reloadBar = document.getElementById('reload-bar');
                const reloadFill = document.getElementById('reload-fill');
                reloadBar.style.display = 'block';
                reloadFill.style.width = (progress * 100) + '%';

                if (progress < 0.15) {
                    const t = progress / 0.15;
                    activeGun.rotation.x = -t * 0.5;
                    activeGun.position.y = -t * 0.04;
                } else if (progress < 0.45) {
                    const t = (progress - 0.15) / 0.3;
                    gunParts.magazine.position.y = -0.40 - t * 0.14;
                    gunParts.magBase.position.y = -0.475 - t * 0.14;
                } else if (progress < 0.55) {
                    const t = (progress - 0.45) / 0.1;
                    gunParts.slideMain.position.z = -0.30 + t * 0.08;
                } else if (progress < 0.75) {
                    const t = (progress - 0.55) / 0.2;
                    gunParts.magazine.position.y = -0.54 + t * 0.14;
                    gunParts.magBase.position.y = -0.615 + t * 0.14;
                } else if (progress < 0.85) {
                    const t = (progress - 0.75) / 0.1;
                    gunParts.slideMain.position.z = -0.22 + (1 - t) * 0.08;
                } else {
                    const t = (progress - 0.85) / 0.15;
                    activeGun.rotation.x = -0.5 * (1 - t);
                    activeGun.position.y = -0.04 * (1 - t);
                }

                if (reloadTimer <= 0) {
                    reloading = false;
                    ammo = maxAmmo;
                    updateAmmoHUD();
                    document.getElementById('reload-bar').style.display = 'none';
                    document.getElementById('reload-fill').style.width = '0%';
                    activeGun.rotation.x = 0;
                    activeGun.position.y = 0;
                    gunParts.magazine.position.y = -0.40;
                    gunParts.magBase.position.y = -0.475;
                    gunParts.slideMain.position.z = -0.30;
                }
            }

            const interactEl = document.getElementById('interact');
            let showInteract = '';
            for (const door of doors) {
                const dx = player.position.x - door.x;
                const dz = player.position.z - door.z;
                if (Math.sqrt(dx*dx + dz*dz) < 2.5) {
                    showInteract = door.open ? '[E] Закрыть дверь' : '[E] Открыть дверь';
                    break;
                }
            }
            if (!showInteract) {
                for (const rope of ropes) {
                    const d1 = Math.sqrt((player.position.x-rope.x1)**2 + (player.position.z-rope.z1)**2);
                    const d2 = Math.sqrt((player.position.x-rope.x2)**2 + (player.position.z-rope.z2)**2);
                    if (d1 < 3 || d2 < 3) {
                        showInteract = '[E] ' + rope.name;
                        break;
                    }
                }
            }
            interactEl.style.display = showInteract ? 'block' : 'none';
            interactEl.textContent = showInteract;

            renderer.render(scene, camera);

            // === MINIMAP ===
            const mc = document.getElementById('minimap');
            const mx = mc.getContext('2d');
            const mw = 200, mh = 200, sc = 2.2;
            mx.fillStyle = '#111';
            mx.fillRect(0, 0, mw, mh);

            const ox = mw / 2 - player.position.x * sc;
            const oz = mh / 2 + player.position.z * sc;

            mx.fillStyle = '#1a1a2e';
            mx.fillRect(ox - 35 * sc, oz - 35 * sc, 70 * sc, 70 * sc);

            for (const wall of walls) {
                const g = wall.geometry;
                const wp = wall.position;
                const sw = g.parameters.width * sc;
                const sd = g.parameters.depth * sc;
                const wx = ox + wp.x * sc;
                const wz = oz - wp.z * sc;
                mx.fillStyle = '#6a6a7a';
                mx.fillRect(wx - Math.max(sw, 2) / 2, wz - Math.max(sd, 2) / 2, Math.max(sw, 2), Math.max(sd, 2));
            }

            for (const door of doors) {
                const dx = ox + door.x * sc;
                const dz = oz - door.z * sc;
                mx.fillStyle = door.open ? '#0f0' : '#f44';
                mx.fillRect(dx - 4, dz - 4, 8, 8);
                mx.fillStyle = '#fff';
                mx.font = '7px Arial';
                mx.fillText(door.open ? 'O' : 'X', dx - 2, dz + 3);
            }

            for (const box of boxes) {
                if (box.type !== 'low') continue;
                const g = box.mesh.geometry;
                const sw = g.parameters.width * sc;
                const sd = g.parameters.depth * sc;
                mx.fillStyle = 'rgba(80,80,120,0.4)';
                mx.fillRect(ox + box.x * sc - sw / 2, oz - box.z * sc - sd / 2, sw, sd);
            }

            const ppx = ox + player.position.x * sc;
            const ppz = oz - player.position.z * sc;
            mx.fillStyle = '#0f0';
            mx.beginPath();
            mx.arc(ppx, ppz, 4, 0, Math.PI * 2);
            mx.fill();

            mx.strokeStyle = '#ff0';
            mx.lineWidth = 2;
            mx.beginPath();
            mx.moveTo(ppx, ppz);
            mx.lineTo(ppx - Math.sin(yaw) * 10, ppz + Math.cos(yaw) * 10);
            mx.stroke();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
